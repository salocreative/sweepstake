name: Deploy to GitHub Pages

# Publishes the Vite production build so static assets (/sweepstake/assets/…) exist on the site.
# After the first successful run: Repo Settings → Pages → Source → Deploy from branch → gh-pages → / (root).
# If you publish the repo root of main instead, browsers load /src/main.jsx (development entry) → 404 and a blank screen.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: gh-pages-${{ github.repository }}
  cancel-in-progress: true

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - run: npm ci
      - run: npm run build
      - uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          force_orphan: true
